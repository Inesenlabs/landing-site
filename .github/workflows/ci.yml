name: CI

on:
  push:
    branches:
      - main
      - staging
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate server syntax
        run: node --check server.mjs

      - name: Verify required files
        run: |
          test -f package.json
          test -f public/index.html
