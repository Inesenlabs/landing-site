name: CI

on:
  push:
    branches:
      - main
      - staging
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check server syntax
        run: node --check server.mjs

      - name: Verify required files
        run: |
          test -f package.json
          test -f server.mjs
          test -f public/index.html

      - name: Start local server
        run: |
          node server.mjs > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for healthcheck
        run: |
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:3000/health; then
              exit 0
            fi
            sleep 1
          done
          cat server.log
          exit 1

      - name: Check runtime config endpoint
        run: curl -fsS http://127.0.0.1:3000/config.js | grep "__LANDING_CONFIG__"

      - name: Stop local server
        if: always()
        run: kill "$(cat server.pid)"
